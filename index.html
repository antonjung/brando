<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Brando</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/brando.png">
  <meta name="theme-color" content="#0d0d1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Brando">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-theme="dark">
<div id="app">

  <!-- ── Home ──────────────────────────────── -->
  <div id="view-home" class="view">
    <header class="app-header">
      <button class="icon-btn" id="btn-menu"><i data-feather="menu"></i></button>
      <h1>Brando</h1>
      <button class="icon-btn" id="btn-settings"><i data-feather="settings"></i></button>
    </header>
    <div id="script-list" class="script-list hidden"></div>
    <div id="empty-state" class="empty-state hidden">
      <div class="empty-icon"><i data-feather="film"></i></div>
      <p>No scripts yet.<br>Import a PDF to get started.</p>
      <button class="btn-primary" id="btn-import-empty">Import PDF</button>
    </div>
  </div>

  <!-- ── Import / Create Script ───────────── -->
  <div id="view-import" class="view hidden">
    <header class="app-header">
      <button class="icon-btn" id="btn-import-quit"><i data-feather="x"></i></button>
      <h1>Create Script</h1>
      <button class="icon-btn" id="btn-import-confirm" disabled><i data-feather="check"></i></button>
    </header>
    <div class="import-content">
      <div class="form-group">
        <label>Script Name</label>
        <input type="text" id="script-name" placeholder="Enter script name..." autocomplete="off">
      </div>
      <div id="import-progress" class="import-progress hidden"></div>
    </div>
  </div>

  <!-- ── Editor ────────────────────────────── -->
  <div id="view-editor" class="view hidden">
    <header class="app-header">
      <button class="icon-btn" id="btn-editor-back"><i data-feather="arrow-left"></i></button>
      <h1 id="editor-title">Edit Script</h1>
      <button class="icon-btn" id="btn-editor-done"><i data-feather="check"></i></button>
    </header>
    <div class="editor-toolbar">
      <i data-feather="zoom-in" class="toolbar-icon"></i>
      <input type="range" id="zoom-slider" min="50" max="250" step="10" value="100">
      <span id="zoom-val">100%</span>
    </div>
    <div id="pdf-viewer" class="pdf-viewer">
      <div id="pdf-pages" class="pdf-pages"></div>
      <div id="pdf-loading" class="pdf-loading hidden">Rendering PDF&hellip;</div>
    </div>
  </div>

  <!-- ── QR ────────────────────────────────── -->
  <div id="view-qr" class="view hidden">
    <header class="app-header">
      <button class="icon-btn" id="btn-qr-back"><i data-feather="arrow-left"></i></button>
      <h1>Connect Reader</h1>
      <div style="width:40px"></div>
    </header>
    <div class="qr-content">
      <p class="qr-instructions">Have your reader scan this QR code to connect</p>
      <div id="qr-code" class="qr-container"></div>
      <div id="qr-status" class="qr-status">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Waiting for connection&hellip;</span>
      </div>
      <div id="peer-id-display" class="peer-id"></div>
      <button class="btn-secondary hidden" id="btn-enter-audition">
        Enter Audition Mode <i data-feather="play"></i>
      </button>
    </div>
  </div>

  <!-- ── Audition ───────────────────────────── -->
  <div id="view-audition" class="view hidden">
    <div id="audition-blank" class="audition-blank">
      <div class="audition-waiting">
        <div class="waiting-dot"></div>
        <div class="waiting-dot"></div>
        <div class="waiting-dot"></div>
      </div>
    </div>
    <div id="audition-text-container" class="audition-text-container hidden">
      <div id="audition-text" class="audition-text"></div>
    </div>
    <button id="btn-exit-audition" class="exit-btn"><i data-feather="x"></i></button>
  </div>

  <!-- ── Reader ────────────────────────────── -->
  <div id="view-reader" class="view hidden">
    <header class="app-header">
      <button class="icon-btn" id="btn-reader-back"><i data-feather="arrow-left"></i></button>
      <h1 id="reader-title">Reading</h1>
      <div id="reader-status" class="reader-status">&#9679;</div>
    </header>
    <div id="reader-sections" class="reader-sections"></div>
  </div>

  <!-- ── Notes ─────────────────────────────── -->
  <div id="view-notes" class="view hidden">
    <header class="app-header">
      <button class="icon-btn" id="btn-notes-back"><i data-feather="arrow-left"></i></button>
      <h1>Notes</h1>
      <button class="icon-btn" id="btn-add-note"><i data-feather="plus"></i></button>
    </header>
    <div id="notes-list" class="notes-list"></div>
  </div>

  <input type="file" id="pdf-input-global" accept=".pdf" hidden>
</div><!-- #app -->

<!-- ── Persistent Footer Nav ─────────────── -->
<nav class="footer-nav" id="footer-nav">
  <button class="footer-btn active" id="btn-footer-home">
    <i data-feather="home"></i>
    <span>Home</span>
  </button>
  <button class="footer-btn" id="btn-footer-edit" disabled>
    <i data-feather="edit-2"></i>
    <span>Edit</span>
  </button>
  <button class="footer-btn footer-me" id="btn-footer-me" disabled>
    <span id="footer-me-label">ME</span>
  </button>
  <button class="footer-btn footer-them" id="btn-footer-them" disabled>
    <span id="footer-them-label">THEM</span>
  </button>
  <span id="app-version" class="app-version-badge"></span>
</nav>

<!-- ── Update Banner ──────────────────────── -->
<div id="update-banner" class="update-banner hidden">
  <span><i data-feather="download-cloud"></i> New version available</span>
  <button id="btn-apply-update">Update Now</button>
</div>

<!-- ── Overlay ─────────────────────────────── -->
<div id="overlay" class="overlay hidden"></div>

<!-- ── Hamburger Menu ─────────────────────── -->
<nav id="menu-panel" class="slide-panel left">
  <div class="panel-header">
    <h2>Brando</h2>
    <button class="icon-btn" id="btn-menu-close"><i data-feather="x"></i></button>
  </div>
  <ul class="menu-list">
    <li><button id="menu-import"><i data-feather="file-text"></i> Import PDF</button></li>
    <li><button id="menu-notes"><i data-feather="book-open"></i> Notes</button></li>
    <li class="menu-divider"></li>
    <li><button id="menu-check-update"><i data-feather="refresh-cw"></i> Check for Update</button></li>
    <li><button id="menu-reload"><i data-feather="rotate-ccw"></i> Reload App</button></li>
  </ul>
  <div class="menu-version" id="menu-version"></div>
</nav>

<!-- ── Settings Panel ─────────────────────── -->
<div id="settings-panel" class="slide-panel right">
  <div class="panel-header">
    <button class="icon-btn" id="btn-settings-close"><i data-feather="x"></i></button>
    <h2>Settings</h2>
  </div>
  <div class="settings-content">
    <div class="setting-group">
      <label>Scroll Speed</label>
      <input type="range" id="setting-scroll" min="10" max="200" step="5">
      <div class="setting-val" id="setting-scroll-val"></div>
    </div>
    <div class="setting-group">
      <label>Theme</label>
      <div class="theme-options">
        <button class="theme-btn" data-theme="dark">Dark</button>
        <button class="theme-btn" data-theme="light">Light</button>
        <button class="theme-btn" data-theme="dyslexia">Dyslexia</button>
      </div>
    </div>
    <div class="setting-group">
      <label>My Lines Label</label>
      <input type="text" id="setting-me" maxlength="10" autocomplete="off">
    </div>
    <div class="setting-group">
      <label>Their Lines Label</label>
      <input type="text" id="setting-them" maxlength="10" autocomplete="off">
    </div>
  </div>
</div>

<!-- CDN libs -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://unpkg.com/feather-icons@4.29.2/dist/feather.min.js"></script>
<script src="version.js"></script>
<script src="js/app.js"></script>
</body>
</html>
